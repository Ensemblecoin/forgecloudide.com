name: Widen hero status cards

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/widen-status-cards.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch hero status card widths
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          text = text.replace(
              'grid-template-columns:repeat(auto-fit,minmax(152px,1fr));gap:12px;margin-top:34px;max-width:920px',
              'grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-top:34px;max-width:1080px',
          )
          text = text.replace(
              '.status-card{min-width:152px;padding:16px}',
              '.status-card{min-width:200px;padding:18px}',
          )
          path.write_text(text, encoding='utf-8')
          PY
          rm .github/workflows/widen-status-cards.yml
      - name: Commit CSS patch
        run: |
          git config user.name "forgecloud-automation"
          git config user.email "actions@users.noreply.github.com"
          git add -A index.html .github/workflows/widen-status-cards.yml
          if git diff --cached --quiet; then
            echo "No CSS changes needed."
            exit 0
          fi
          git commit -m "Widen hero status cards"
          git push
